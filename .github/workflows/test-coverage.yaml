name: test-coverage

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio homeassistant python-dateutil pytz pytest-homeassistant-custom-component pytest-socket syrupy

      - name: Test coverage & Snapshot generation
        run: |
          PYTHONPATH=. pytest tests/ --snapshot-update --cov=custom_components.myhome --cov-report=xml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "tests/**/__snapshots__/*" || true
          git add "tests/__snapshots__/*" || true
          git commit -m "chore: auto-generate syrupy snapshots [skip ci]" || echo "No snapshots changed"
          git push || echo "No snapshots pushed"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
